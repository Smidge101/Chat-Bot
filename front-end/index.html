<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hacka Chat Bot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Virtual Eddie</h1>
        <h2 class="description">Here to help with your class schedule!</h2>
        <img class="profile-img" src="EddieTail-modified.png" alt="Virtual Eddie" />
        <div id="chat-box" class="chat-box"></div>
        <input type="text" id="user-input" placeholder="Type your question here..." />
        <button id="send-btn">></button>
    </div>

        <!-- LLM response appears here -->
    <div id="bot-response" class="bot-response">Hi my name is Eddie! Ask me questions about classes.</div>

    <script src="scripts.js"></script>
</html>
